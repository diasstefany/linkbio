<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stéfany Dias</title>

<style>
body {
margin: 0;
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(180deg, #f5e6dc, #f0d8c8);
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
}

.container {
width: 100%;
max-width: 400px;
padding: 20px;
text-align: center;
}

.profile-img {
width: 100%;
border-radius: 20px;
box-shadow: 0 10px 30px rgba(0,0,0,0.2);
margin-bottom: 0px;
}

h1 {
margin: 10px 0;
color: #5a3e36;
font-size: 24px;
}

.button {
display: block;
width: 94%;
padding: 14px;
margin: 10px 0;
text-decoration: none;
color: #fff;
background: #c97c5d;
border-radius: 12px;
font-weight: bold;
transition: 0.3s;
}

.button:hover {
background: #a85f44;
transform: scale(1.03);
}

.email {
background: #8c5a4a;
}

.tiktok {
background: #a66b5b;
}

@media (max-width: 500px) {
.container {
padding: 15px;
}

h1 {
font-size: 20px;
}
}
</style>
</head>

<body>

<div class="container">

<img src="IMG_7.JPG" alt="Stefany Dias" class="profile-img">

<h1>Stefany Dias</h1>

<a href="https://www.instagram.com/diasstefany/" class="button">Instagram</a>
<a href="contato@diasstefany.com.br" class="button email">E-mail</a>
